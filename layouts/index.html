<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEO HWARANG - tanec, soutěže a láska ke K-popu</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            height: 100%;
            font-family: system-ui, -apple-system, sans-serif;
            color: white;
            overflow: hidden;
        }
        .bg {
            position: fixed;
            inset: 0;
            background: url('/banner01.jpg') center/cover no-repeat;
            filter: brightness(0.65);
            z-index: 1;
        }
        .overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.4), rgba(0,0,0,0.85));
            z-index: 2;
        }
        .content {
            position: relative;
            z-index: 3;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            text-align: center;
            padding-bottom: 15vh;
            padding-left: 20px;
            padding-right: 20px;
        }
        h1 {
            font-size: 4.8rem;
            font-weight: 700;
            margin-bottom: 1.2rem;
            letter-spacing: -1.5px;
        }
        p {
            font-size: 1.35rem;
            max-width: 680px;
            line-height: 1.65;
            margin-bottom: 2.5rem;
            opacity: 0.95;
        }
        .instagram {
            color: #ff69b4;
            font-size: 1.5rem;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .instagram:hover {
            color: #ff1493;
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="overlay"></div>

    <div class="content">
        <h1>NEO HWARANG</h1>
        <p>Tuto stránku jsem vytvořil jako místo, kde můžu sdílet svou cestu, chyby i úspěchy.<br>
        Jsem rád, že jsi tady.</p>
        
        <a href="https://www.instagram.com/kucerast1/" target="_blank" class="instagram">
            <span>Mrkni na Instagram →</span>
        </a>
    </div>
</body>
</html>
