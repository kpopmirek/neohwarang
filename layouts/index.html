{{ define "main" }}
<div class="relative min-h-screen flex items-center justify-center overflow-hidden">
    
    <!-- Background obrázek -->
    <div class="absolute inset-0 bg-cover bg-center" 
         style="background-image: url('{{ .Site.Params.homepage.homepageImage | default "banner01.jpg" }}');">
    </div>

    <!-- Tmavý overlay -->
    <div class="absolute inset-0 bg-black/75"></div>

    <!-- Hlavní textový obsah -->
    <div class="relative z-10 text-center px-6 max-w-2xl mx-auto" style="margin-top: 15vh;">
        
        <h1 class="text-5xl md:text-6xl font-bold text-white mb-8 tracking-tight">
            {{ .Site.Title }}
        </h1>

        <div class="prose prose-invert mx-auto text-lg text-white/90 leading-relaxed">
            {{ .Site.Params.description | default .Site.Params.homepage.heroSubtitle | safeHTML }}
        </div>

        <!-- Instagram odkaz -->
        <div class="mt-12">
            <a href="https://www.instagram.com/kucerast1/" 
               target="_blank"
               class="inline-flex items-center gap-3 text-white hover:text-pink-400 transition-colors">
                <img src="/images/logo.png" alt="Instagram" class="w-10 h-10">
                <span class="text-xl">Mrkni na Instagram</span>
            </a>
        </div>

    </div>
</div>
{{ end }}
