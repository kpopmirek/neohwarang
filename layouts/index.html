<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEO HWARANG - tanec, soutěže a láska ke K-popu</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, sans-serif;
            color: white;
            overflow: hidden;
        }
        .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('/banner01.jpg') center/cover no-repeat;
            filter: brightness(0.6);
            z-index: 1;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.75);
            z-index: 2;
        }
        .content {
            position: relative;
            z-index: 3;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }
        h1 {
            font-size: 5.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            letter-spacing: -2px;
        }
        p {
            font-size: 1.4rem;
            max-width: 700px;
            line-height: 1.7;
            margin-bottom: 3rem;
        }
        .instagram {
            color: #ff69b4;
            font-size: 1.6rem;
            text-decoration: none;
        }
        .instagram:hover {
            color: #ff1493;
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="overlay"></div>

    <div class="content">
        <h1>NEO HWARANG</h1>
        <p>Tuto stránku jsem vytvořil jako místo, kde můžu sdílet svou cestu, chyby i úspěchy.<br>
        Jsem rád, že jsi tady.</p>
        
        <a href="https://www.instagram.com/kucerast1/" target="_blank" class="instagram">
            Mrkni na Instagram →
        </a>
    </div>
</body>
</html>
