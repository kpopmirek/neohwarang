<style>
    /* LIŠKA JAKO KURZOR */
    html, body {
        cursor: url('/images/liska.png'), auto !important;
    }

    a, button, [role="button"], .cursor-pointer {
        cursor: url('/images/liska.png'), pointer !important;
    }

    /* ÚPRAVA PRO PROFIL (pokud chceš text trochu vlevo) */
    @media (min-width: 768px) {
        .flex.flex-col.items-center.text-center {
            align-items: flex-start !important; /* Zarovná text a avatara doleva */
            text-align: left !important;
            margin-left: 5vw !important;      /* Mezera od levého kraje */
        }
    }
</style>

<script>
    /* POJISTKA PRO TMAVÝ REŽIM */
    localStorage.setItem('appearance', 'dark');
    document.documentElement.classList.add('dark');
</script>
