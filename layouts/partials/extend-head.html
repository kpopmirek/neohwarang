<style>
    /* Hvězdička (*) zajistí, že liška bude aktivní úplně na všem */
    *, *::before, *::after {
        /* 16 je polovina šířky (střed), 0 je úplný vršek obrázku */
        cursor: url('/images/liska.png') 16 0, auto !important;
    }

    /* Pro klikací prvky (odkazy, tlačítka) */
    a, button, [role="button"], input, select, textarea {
        cursor: url('/images/liska.png') 16 0, pointer !important;
    }
</style>

<script>
    /* POJISTKA PRO TMAVÝ REŽIM */
    localStorage.setItem('appearance', 'dark');
    document.documentElement.classList.add('dark');
</script>
